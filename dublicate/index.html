document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

#F4F2EC;\n    --ink: #0E1620;\n    --ink-2: #2A323D;\n    --muted: #6B7380;\n    --line: rgba(14,22,32,0.08);\n    --line-strong: rgba(14,22,32,0.14);\n\n    --dark: #0E1620;\n    --dark-2: #1A2330;\n\n    --r-sm: 10px;\n    --r-md: 16px;\n    --r-lg: 24px;\n    --r-xl: 32px;\n\n    --shadow-sm: 0 1px 2px rgba(14,22,32,0.04), 0 2px 6px rgba(14,22,32,0.04);\n    --shadow-md: 0 4px 12px rgba(14,22,32,0.06), 0 14px 36px rgba(14,22,32,0.06);\n    --shadow-lg: 0 24px 60px -12px rgba(14,22,32,0.18), 0 8px 18px rgba(14,22,32,0.06);\n    --shadow-orange: 0 14px 36px -8px rgba(255,94,0,0.45), 0 6px 14px rgba(255,94,0,0.18);\n\n    --container: 1200px;\n  }\n\n  *,*::before,*::after { box-sizing: border-box; }\n  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }\n  body {\n    margin: 0;\n    font-family: \"Inter\", system-ui, -apple-system, sans-serif;\n    color: var(--ink);\n    background: var(--bg);\n    font-size: 16px;\n    line-height: 1.55;\n    overflow-x: hidden;\n  }\n  img { max-width: 100%; height: auto; display: block; }\n  a { color: inherit; text-decoration: none; }\n  button { font-family: inherit; cursor: pointer; border: 0; background: none; }\n\n  h1,h2,h3,h4 { font-family: \"Geist\", \"Inter\", sans-serif; font-weight: 600; letter-spacing: -0.02em; margin: 0; line-height: 1.05; color: var(--ink); }\n  h1 { font-size: clamp(40px, 6vw, 78px); font-weight: 700; letter-spacing: -0.035em; line-height: 0.98; }\n  h2 { font-size: clamp(32px, 4.2vw, 56px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.02; }\n  h3 { font-size: clamp(22px, 2.2vw, 30px); font-weight: 600; }\n  h4 { font-size: 18px; font-weight: 600; }\n  p { margin: 0; color: var(--ink-2); }\n\n  .mono { font-family: \"Geist Mono\", ui-monospace, monospace; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }\n\n  .container { max-width: var(--container); margin: 0 auto; padding: 0 24px; }\n  .section { padding: 120px 0; position: relative; }\n  .section-tight { padding: 80px 0; }\n\n  /* ---------- BUTTONS ---------- */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n    padding: 14px 22px; border-radius: 999px; font-weight: 600; font-size: 15px;\n    transition: transform .2s cubic-bezier(.2,.7,.3,1), box-shadow .25s, background .2s, color .2s;\n    white-space: nowrap;\n  }\n  .btn:active { transform: translateY(1px); }\n  .btn-primary { background: var(--orange); color: #fff; box-shadow: var(--shadow-orange); }\n  .btn-primary:hover { background: var(--orange-deep); transform: translateY(-1px); }\n  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line-strong); }\n  .btn-ghost:hover { background: var(--surface); border-color: var(--ink); }\n  .btn-dark { background: var(--ink); color: #fff; }\n  .btn-dark:hover { background: #000; transform: translateY(-1px); }\n  .btn-lg { padding: 17px 28px; font-size: 16px; }\n\n  .btn .arrow { transition: transform .2s; }\n  .btn:hover .arrow { transform: translateX(3px); }\n\n  /* ---------- STORE BUTTONS (custom redesign) ---------- */\n  .store-row { display: flex; gap: 12px; flex-wrap: wrap; }\n  .store-btn {\n    display: inline-flex; align-items: center; gap: 12px;\n    background: var(--ink); color: #fff;\n    padding: 14px 24px;\n    border-radius: 14px;\n    transition: transform .2s, background .2s, box-shadow .25s;\n    box-shadow: var(--shadow-sm);\n    min-width: 200px;\n    line-height: 1;\n  }\n  .store-btn:hover { background: #000; transform: translateY(-2px); box-shadow: var(--shadow-md); }\n  .store-btn .ico { width: 28px; height: 28px; flex: 0 0 28px; display: block; color: #fff; }\n  .store-btn .lbl { display: flex; flex-direction: column; gap: 3px; line-height: 1.1; }\n  .store-btn .lbl .top { font-size: 11px; opacity: .75; letter-spacing: 0.04em; line-height: 1; }\n  .store-btn .lbl .bot { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; font-family: \"Geist\", sans-serif; line-height: 1.1; white-space: nowrap; }\n  .store-btn.on-light { background: var(--ink); color: #fff; }\n  .store-btn.on-orange { background: #fff; color: var(--ink); }\n  .store-btn.on-orange:hover { background: #fff; }\n\n  /* ---------- NAV ---------- */\n  .nav-wrap { position: sticky; top: 0; z-index: 50; background: rgba(250,250,247,0.78); backdrop-filter: saturate(150%) blur(14px); border-bottom: 1px solid transparent; transition: border-color .2s, background .2s; }\n  .nav-wrap.scrolled { border-color: var(--line); }\n  .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }\n  .logo { display: flex; align-items: center; gap: 10px; font-family: \"Geist\", sans-serif; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; }\n  .logo-mark { width: 32px; height: 32px; border-radius: 9px; background: var(--orange); display: grid; place-items: center; color: #fff; font-size: 18px; font-weight: 700; }\n  .logo-mark::before { content: \"Q\"; font-family: \"Geist\", sans-serif; }\n  .nav-links { display: flex; gap: 28px; }\n  .nav-links a { font-size: 14px; color: var(--ink-2); font-weight: 500; transition: color .2s; }\n  .nav-links a:hover { color: var(--orange); }\n  .nav-cta { display: flex; gap: 10px; align-items: center; }\n  @media (max-width: 880px) {\n    .nav-links { display: none; }\n  }\n\n  /* ---------- HERO ---------- */\n  .hero { padding: 80px 0 140px; position: relative; overflow: hidden; }\n  .hero::before {\n    content: \"\";\n    position: absolute;\n    width: 800px; height: 800px;\n    border-radius: 50%;\n    background: radial-gradient(circle, rgba(255,94,0,0.18) 0%, rgba(255,94,0,0) 60%);\n    top: -200px; right: -150px;\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero::after {\n    content: \"\";\n    position: absolute;\n    width: 500px; height: 500px;\n    border-radius: 50%;\n    background: radial-gradient(circ footer>\n\n<script>\n  // Reveal on scroll\n  const io = new IntersectionObserver((entries) => {\n    for (const e of entries) {\n      if (e.isIntersecting) {\n        e.target.classList.add(\"in\");\n        io.unobserve(e.target);\n      }\n    }\n  }, { threshold: 0.12, rootMargin: \"0px 0px -50px 0px\" });\n  document.querySelectorAll(\".reveal\").forEach(el => io.observe(el));\n\n  // Sticky nav border on scroll\n  const nav = document.getElementById(\"nav\");\n  const onScroll = () => {\n    if (window.scrollY > 4) nav.classList.add(\"scrolled\"); else nav.classList.remove(\"scrolled\");\n\n    // Parallax (only in hero region)\n    const phone = document.getElementById(\"heroPhone\");\n    if (phone) {\n      const rect = phone.getBoundingClientRect();\n      if (rect.bottom > 0 && rect.top < window.innerHeight) {\n        const elements = document.querySelectorAll(\"[data-parallax]\");\n        elements.forEach(el => {\n          const speed = parseFloat(el.dataset.parallax);\n          el.style.transform = `translateY(${window.scrollY * speed}px) ${el.classList.contains('phone-frame') ? 'rotate(-3deg)' : el.classList.contains('phone-floating') ? 'rotate(4deg)' : el.classList.contains('phone-floating-2') ? 'rotate(-5deg)' : ''}`;\n        });\n      }\n    }\n  };\n  window.addEventListener(\"scroll\", onScroll, { passive: true });\n  onScroll();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
