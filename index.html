<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Touch Waiter — Run your restaurant from your phone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* QTW Landing — design tokens & base */
        :root {
            --orange: #FF5E00;
            --orange-soft: #FF7A2A;
            --orange-tint: #FFE9DB;
            --orange-deep: #C84300;
            --blue: #346897;
            --blue-soft: #5B89B6;
            --blue-tint: #E2ECF5;
            --ink: #0E0F12;
            --ink-2: #2A2D34;
            --ink-3: #5A5F6B;
            --ink-4: #8A909C;
            --line: #E8E9EE;
            --line-2: #F1F2F6;
            --bg: #FFFFFF;
            --bg-soft: #FAFAF8;
            --bg-warm: #FFF7F1;

            --r-sm: 10px;
            --r-md: 16px;
            --r-lg: 24px;
            --r-xl: 32px;
            --r-2xl: 44px;

            --shadow-card: 0 1px 2px rgba(14,15,18,0.04), 0 8px 24px -8px rgba(14,15,18,0.08);
            --shadow-pop: 0 2px 4px rgba(14,15,18,0.04), 0 24px 60px -20px rgba(14,15,18,0.18);
            --shadow-orange: 0 18px 50px -18px rgba(255,94,0,0.55);

            --font-display: 'Geist', 'General Sans', system-ui, sans-serif;
            --font-body: 'Geist', 'General Sans', system-ui, sans-serif;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            color: var(--ink);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-feature-settings: "ss01", "cv11";
            line-height: 1.5;
            overflow-x: hidden;
        }

        img { max-width: 100%; display: block; }
        button { font-family: inherit; cursor: pointer; border: 0; background: none; }
        a { color: inherit; text-decoration: none; }

        .container {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 28px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--ink-3);
        }
        .eyebrow .dot {
            width: 6px; height: 6px; border-radius: 999px;
            background: var(--orange);
        }

        h1, h2, h3, h4 {
            font-family: var(--font-display);
            letter-spacing: -0.02em;
            margin: 0;
            color: var(--ink);
            text-wrap: balance;
        }

        .h-display {
            font-size: clamp(44px, 6.4vw, 88px);
            line-height: 0.98;
            letter-spacing: -0.035em;
            font-weight: 600;
        }
        .h-section {
            font-size: clamp(34px, 4.4vw, 60px);
            line-height: 1.02;
            letter-spacing: -0.03em;
            font-weight: 600;
        }
        .h-card {
            font-size: 22px;
            line-height: 1.2;
            font-weight: 600;
            letter-spacing: -0.015em;
        }

        .lede {
            font-size: clamp(17px, 1.5vw, 20px);
            line-height: 1.5;
            color: var(--ink-3);
            text-wrap: pretty;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            height: 52px;
            padding: 0 22px;
            border-radius: 999px;
            font-size: 15.5px;
            font-weight: 500;
            letter-spacing: -0.005em;
            transition: transform .18s ease, box-shadow .25s ease, background .2s ease, color .2s ease;
            white-space: nowrap;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--orange);
            color: #fff;
            box-shadow: var(--shadow-orange);
        }
        .btn-primary:hover { background: #FF6B14; box-shadow: 0 22px 60px -18px rgba(255,94,0,0.7); }
        .btn-ghost {
            background: transparent;
            color: var(--ink);
            border: 1px solid var(--line);
        }
        .btn-ghost:hover { background: var(--bg-soft); border-color: #DCDDE3; }
        .btn-dark {
            background: var(--ink);
            color: #fff;
        }
        .btn-dark:hover { background: #1c1d22; }
        .btn-sm { height: 42px; padding: 0 16px; font-size: 14px; }
        .btn-lg { height: 58px; padding: 0 26px; font-size: 16px; }

        .btn .arrow {
            width: 18px; height: 18px;
            transition: transform .25s ease;
        }
        .btn:hover .arrow { transform: translateX(3px); }

        /* Reveal on scroll */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1);
        }
        .reveal.in {
            opacity: 1;
            transform: none;
        }

        /* Section spacing */
        section { position: relative; }
        .section {
            padding: clamp(80px, 10vw, 140px) 0;
        }
        .section-tight { padding: clamp(60px, 7vw, 96px) 0; }

        /* Subtle grain background helper */
        .grain::before {
            content: "";
            position: absolute; inset: 0;
            background-image: radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 3px 3px;
            opacity: 0.4;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        /* Hide scrollbars in marquee */
        .marquee-mask {
            -webkit-mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);
        }

        /* Phone shell */
        .phone {
            width: 280px;
            height: 580px;
            border-radius: 44px;
            background: #0E0F12;
            padding: 10px;
            box-shadow: 0 40px 100px -30px rgba(14,15,18,0.4), 0 8px 30px -10px rgba(14,15,18,0.2);
            position: relative;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 36px;
            background: #fff;
            overflow: hidden;
            position: relative;
        }
        .phone-notch {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 92px;
            height: 26px;
            background: #0E0F12;
            border-radius: 20px;
            z-index: 5;
        }

        /* Animated reveal for nav border */
        .nav-border {
            background: linear-gradient(90deg, transparent, var(--line) 20%, var(--line) 80%, transparent);
            height: 1px;
        }

        /* Sticky mobile CTA */
        .mobile-cta {
            position: fixed;
            bottom: 16px;
            left: 16px; right: 16px;
            z-index: 60;
            display: none;
            background: var(--ink);
            color: #fff;
            border-radius: 999px;
            padding: 14px 18px 14px 22px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 24px 60px -18px rgba(14,15,18,0.5);
            font-weight: 500;
            font-size: 15px;
            transform: translateY(150%);
            transition: transform .35s cubic-bezier(.2,.7,.2,1);
        }
        .mobile-cta.in {
            transform: translateY(0);
        }
        .mobile-cta .pill {
            background: var(--orange);
            color: #fff;
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: 500;
            font-size: 13.5px;
        }

        @media (max-width: 720px) {
            .mobile-cta { display: flex; }
        }

        /* Card hover */
        .hover-lift { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, border-color .25s ease; }
        .hover-lift:hover { transform: translateY(-4px); }

        /* Tag/chip */
        .chip {
            display: inline-flex; align-items: center; gap: 6px;
            height: 28px; padding: 0 12px;
            border-radius: 999px;
            background: var(--bg-soft);
            border: 1px solid var(--line);
            font-size: 12.5px;
            color: var(--ink-3);
            font-weight: 500;
        }

        /* Gradient hero blob */
        .hero-blob {
            position: absolute;
            pointer-events: none;
            filter: blur(80px);
            opacity: 0.7;
        }

        /* Faux UI typography for phone screens */
        .ui-mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; }

        /* Footer */
        footer { background: #0B0C0F; color: #C8CAD0; }
        footer a:hover { color: #fff; }

    </style>
    <style>
        /* Skeleton splash while React boots */
        .qtw-splash {
            position: fixed; inset: 0; background: #fff;
            display: grid; place-items: center;
            z-index: 100;
            transition: opacity .35s ease;
        }
        .qtw-splash.gone { opacity: 0; pointer-events: none; }
        .qtw-splash .pulse {
            width: 36px; height: 36px; border-radius: 12px;
            background: var(--orange);
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: .9; }
            50% { transform: scale(1.15); opacity: .6; }
        }
    </style>
</head>

        if (app && app.children.length > 0) {
            document.getElementById("splash").classList.add("gone");
        } else {
            requestAnimationFrame(tryHide);
        }
    };
    setTimeout(tryHide, 100);
</script>
</body>
</html>
